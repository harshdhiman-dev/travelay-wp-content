name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SFTP
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.FTP_HOST }}
          user: ${{ secrets.FTP_USER }}
          pass: ${{ secrets.FTP_PASS }}
          remoteDir: ${{ secrets.FTP_REMOTE_PATH }}
          localDir: './'
          options: '--verbose --no-perms'
          settings: 'sftp:auto-confirm yes; set ssl:verify-certificate false; set net:timeout 30; set ftp:ssl-protect-data true;'
          port: 65002
          protocol: sftp
