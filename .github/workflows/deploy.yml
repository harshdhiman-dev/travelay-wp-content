name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SFTP
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.FTP_HOST }}
          user: ${{ secrets.FTP_USER }}
          pass: ${{ secrets.FTP_PASS }}

          protocol: sftp
          port: 65002

          localDir: ./
          remoteDir: ${{ secrets.FTP_REMOTE_PATH }}

          options: --verbose --no-perms --parallel=10

          settings: |
            sftp:auto-confirm yes
            ssl:verify-certificate no
            net:timeout 60
            net:max-retries 3
